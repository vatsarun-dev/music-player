<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

    <main>
        <section class="page1">
            <div class="cards">
         <div class="box">
            <img src="https://i.scdn.co/image/ab67616d0000b27324ad9302d36c1e36ed025963" alt="">
            <div class="dets">
                <h3>Uska Hi</h3>
                <h3 style="font-size:25px">
                   1920 Evils Return
                </h3>
            </div>
         </div>
         <div class="box">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/9f/Lady_Gaga_-_Judas_%28single%29.png/250px-Lady_Gaga_-_Judas_%28single%29.png" alt="">
            <div class="dets">
                <h3>Judas</h3>
                <h3>
                    Lady Gaga
                </h3>
            </div>
         </div>
         <div class="box">
            <img style="height:200px;object-position:center;object-fit:cover" src="https://i.pinimg.com/736x/d0/59/d1/d059d1b638a74803d493cb12f5fec22c.jpg" alt="">
            <div class="dets">
                <h3>Blinding Lights</h3>
                <h3 style="font-size:25px">
                    The Weeknd
                </h3>
            </div>
         </div>
         <div class="box">
            <img src="https://i.pinimg.com/736x/1c/3a/1f/1c3a1f747cd206933c9dadfdc38e07e2.jpg" alt="">
            <div class="dets">
                <h3>Mockingbird</h3>
                <h3>
                    Eminem
                </h3>
            </div>
         </div>
         <div class="box">
            <img src="https://i.ytimg.com/vi/1rVY08gRGmA/maxresdefault.jpg" alt="">
            <div class="dets">
                <h3>Fairy Tale</h3>
                <h3>
                    Alexander
                </h3>
            </div>
         </div>
         </div>
         <div class="music">
            <div class="icons">
                <i id="prev" class="ri-skip-back-fill"></i>
            <i id="play" class="ri-play-large-fill"></i>
            <i id="pause" style="display:none" class="ri-pause-large-line"></i>
            <i id="next" class="ri-skip-forward-fill"></i>
            </div>
            <div class="details">
                <img style="border-radius:10px" src="https://i.pinimg.com/736x/d0/59/d1/d059d1b638a74803d493cb12f5fec22c.jpg" alt="">
                <div class="head">
                     <h3>Blinding Lights</h3>
                <h3>
                    The Weeknd
                </h3>
                </div><div class="img">
                <img style="display:none; ;" src="./assets/icons8-audio-wave.gif" alt=""></div>
            </div>
         </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
